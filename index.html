<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IQ Challenge Pro</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background: linear-gradient(135deg,#fbc2eb,#a6c1ee);
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.container{
position:relative;
width:420px;
background:#ffffffcc;
backdrop-filter: blur(10px);
border-radius:25px;
padding:25px;
box-shadow:0 15px 35px rgba(0,0,0,0.15);
text-align:center;
}

h1{
margin-bottom:15px;
color:#444;
font-weight:600;
}

input, select{
width:100%;
padding:12px;
margin:8px 0;
border-radius:12px;
border:1px solid #ddd;
outline:none;
transition:0.3s;
}

input:focus, select:focus{
border-color:#a78bfa;
box-shadow:0 0 5px #c4b5fd;
}

button{
width:100%;
padding:12px;
margin-top:10px;
border-radius:12px;
border:none;
background: linear-gradient(135deg,#a78bfa,#60a5fa);
color:white;
font-weight:bold;
cursor:pointer;
transition:0.3s;
}

button:hover{
transform:scale(1.05);
opacity:0.9;
}

.hidden{display:none;}

.option{
background:#f9fafb;
padding:12px;
margin:6px 0;
border-radius:12px;
cursor:pointer;
transition:0.3s;
border:1px solid #eee;
animation: fade 0.3s ease;
}

.option:hover{
background:#e0e7ff;
}

.option.correct{
background:#86efac;
color:#065f46;
}

.option.wrong{
background:#fca5a5;
color:#7f1d1d;
}

@keyframes fade{
from{opacity:0; transform:translateY(10px);}
to{opacity:1; transform:translateY(0);}
}

.progress{
height:10px;
background:#eee;
border-radius:10px;
overflow:hidden;
margin:10px 0;
}

.progress-bar{
height:100%;
width:0%;
background: linear-gradient(90deg,#a78bfa,#60a5fa);
}

.timer{
text-align:right;
font-weight:bold;
color:#fb7185;
margin-bottom:5px;
}

.result h2{
color:#6366f1;
margin-bottom:10px;
}

.result p{
font-size:16px;
color:#555;
}

.container::before{
content:"✨";
position:absolute;
top:10px;
left:15px;
font-size:20px;
}

.container::after{
content:"🌸";
position:absolute;
bottom:10px;
right:15px;
font-size:20px;
}
</style>
</head>

<body>
<div class="container">

<div id="start">
<h1>IQ Challenge Pro</h1>
<input type="text" id="nama" placeholder="Masukkan Nama">

<select id="level">
<option value="">Pilih Level</option>
<option value="SD">SD</option>
<option value="SMP">SMP</option>
<option value="SMA">SMA/SMK</option>
</select>

<button onclick="startQuiz()">Mulai</button>
</div>

<div id="quiz" class="hidden">
<div class="timer" id="timer">60</div>
<div class="progress"><div class="progress-bar" id="progress"></div></div>
<h3 id="question"></h3>
<div id="options"></div>
<button onclick="nextQuestion()">Next</button>
</div>

<div id="result" class="hidden result">
<h2 id="score"></h2>
<p id="message"></p>
<button onclick="location.reload()">Ulang</button>
</div>

</div>

<script>
let allQuestions = {

// SD

SD: [
{q:"5 + 7 = …",a:["10","11","12","13"],correct:2},
{q:"12 - 4 = …",a:["6","7","8","9"],correct:2},
{q:"3 × 6 = …",a:["12","15","18","20"],correct:2},
{q:"20 ÷ 5 = …",a:["2","3","4","5"],correct:2},
{q:"Antonim dari 'besar' adalah …",a:["tinggi","kecil","panjang","lebar"],correct:1},
{q:"Sinonim dari 'senang' adalah …",a:["sedih","marah","gembira","takut"],correct:2},
{q:"Kalimat yang benar adalah…",a:["saya pergi","Saya pergi","saya Pergi","Saya Pergi"],correct:1},
{q:"Kata kerja adalah …",a:["Ibu","dapur","memasak","di"],correct:2},
{q:"Arti dari cat adalah …",a:["anjing","kucing","burung","ikan"],correct:1},
{q:"I _ a student.",a:["is","am","are","be"],correct:1},
{q:"Buku dalam bahasa inggris adalah …",a:["pen","bag","book","table"],correct:2},
{q:"She _ my friend.",a:["is","am","are","be"],correct:0},
{q:"Energi matahari menghasilkan …",a:["panas","air","tanah","angin"],correct:0},
{q:"Air menjadi es karena …",a:["panas","dingin","aduk","jemur"],correct:1},
{q:"Proses tumbuhan membuat makanan disebut  …",a:["respirasi","fotosintesis","uap","napas"],correct:1},
{q:"Hewan yang berkembangbiak dengan cara bertelur disebut …",a:["vivipar","ovipar","ovovivipar","herbi"],correct:1},
{q:"Presiden adalah pemimpin …",a:["desa","kota","negara","sekolah"],correct:2},
{q:"Indonesia terletak dibenua…",a:["Afrika","Asia","Eropa","Australia"],correct:1},
{q:"Contoh transportasi laut adalah …",a:["mobil","pesawat","kapal","sepeda"],correct:2},
{q:"Kegiatan jual beli disebut …",a:["produksi","distribusi","konsumsi","perdagangan"],correct:3}
],


SMP: [
{q:"15 + (-7) = …",a:["8","-8","22","-22"],correct:0},
{q:"3² + 4² = …",a:["7","12","25","49"],correct:2},
{q:"2x + 5 = 15, x = …",a:["5","10","15","20"],correct:0},
{q:"Luas persegi sisi 6 cm …",a:["12","24","36","48"],correct:2},
{q:"Kalimat utama biasanya terletak di  …",a:["awal/akhir","tengah","semua","tidak"],correct:0},
{q:"Sinonim dari cepat adalah …",a:["lambat","gesit","malas","lemah"],correct:1},
{q:"Penulisan kata baku yang benar adalah…",a:["aktifitas","aktipitas","aktivitas","aktiftas"],correct:2},
{q:"Teks yang berisi langkah-langkah disebut teks …",a:["deskripsi","narasi","prosedur","eksposisi"],correct:2},
{q:"They _ playing.",a:["is","am","are","be"],correct:2},
{q:"Beautiful …",a:["jelek","cantik","besar","kecil"],correct:1},
{q:"Went = …",a:["present","past","future","cont"],correct:1},
{q:"She _ now.",a:["read","reads","is reading","reading"],correct:2},
{q:"Gaya yang menyebabkan benda jatuh ke bumi adalah gaya …",a:["gesek","magnet","gravitasi","dorong"],correct:2},
{q:"Organ pernapasan manusia adalah …",a:["jantung","paru","hati","ginjal"],correct:1},
{q:"Perubahan wujud cair menjadi gas disebut …",a:["cair","beku","uap","embun"],correct:2},
{q:"Planet yang paling dekat dengan matahari adalah …",a:["Venus","Bumi","Merkurius","Mars"],correct:2},
{q:"Kegiatan menghasilkan barang disebut …",a:["konsumsi","distribusi","produksi","transaksi"],correct:2},
{q:"Ibu kota Indonesia adalah …",a:["Bandung","Surabaya","Jakarta","Medan"],correct:2},
{q:"ASEAN adalah organisasi negara-negara di kawasan …",a:["Eropa","Asia Tenggara","Afrika","Amerika"],correct:1},
{q:"Peta digunakan untuk menunjukkan …",a:["cuaca","lokasi","waktu","suhu"],correct:1}
],


SMA: [
{q:"2x + 3 = 11, nilai x adalah= …",a:["2","3","4","5"],correct:2},
{q:"√81 = …",a:["7","8","9","10"],correct:2},
{q:"5² × 2 = …",a:["20","25","50","100"],correct:2},
{q:"Gradien dari persamaaan y = 3x + 2 adalah …",a:["2","3","5","6"],correct:1},
{q:"Teks yang bertujuan meyakinkan pembaca disebut …",a:["narasi","deskripsi","persuasi","eksposisi"],correct:2},
{q:"Bentuk tidak baku dari risiko adalah …",a:["resiko","risiko","riseco","rissiko"],correct:0},
{q:"Majas perbandingan yang menggunakan kata seperti bagai, laksana disebut …",a:["metafora","personifikasi","simile","hiperbola"],correct:2},
{q:"Kalimat efektif adalah kalimat yang …",a:["panjang","bertele","jelas","rumit"],correct:2},
{q:"She _ to school every day.",a:["go","goes","going","gone"],correct:1},
{q:"Environment artinya …",a:["lingkungan","pendidikan","kesehatan","pekerjaan"],correct:0},
{q:"If I had money, I _ a car.",a:["buy","will buy","would buy","buying"],correct:2},
{q:"They have finished termasuk …",a:["present","past","perfect","future"],correct:2},
{q:"Hukum Newton I dikenal sebagai hukum …",a:["gravitasi","aksi","kelembaman","percepatan"],correct:2},
{q:"Sel adalah unit terkecil dari makhluk …",a:["mati","hidup","energi","zat"],correct:1},
{q:"Rumus kecepatan adalah …",a:["s×t","s÷t","t÷s","s+t"],correct:1},
{q:"Unsur dengan simbol O adalah …",a:["emas","oksigen","perak","besi"],correct:1},
{q:"Distribusi dalam ekonomi adalah …",a:["produksi","penyaluran","konsumsi","investasi"],correct:1},
{q:"Sistem ekonomi Indonesia adalah …",a:["liberal","komando","campuran","tradisional"],correct:2},
{q:"Inflasi adalah kondisi ketika …",a:["harga naik","harga turun","produksi naik","pendapatan turun"],correct:0},
{q:"Benua terbesar didunia adalah …",a:["Afrika","Amerika","Asia","Eropa"],correct:2}
]

};

let questions = [];
let index=0, score=0, time=60, timer, namaUser="", answered=false;

function startQuiz(){
namaUser=document.getElementById("nama").value;
let level=document.getElementById("level").value;

if(namaUser==""||level==""){
alert("Lengkapi dulu!");
return;
}

// waktu beda tiap level
if(level=="SD") time=90;
else if(level=="SMP") time=60;
else time=45;

questions = allQuestions[level];

document.getElementById("start").classList.add("hidden");
document.getElementById("quiz").classList.remove("hidden");

loadQuestion();
startTimer();
}

function loadQuestion(){
answered=false;
let q=questions[index];
document.getElementById("question").innerText=(index+1)+". "+q.q;

let html="";
q.a.forEach((opt,i)=>{
html+=`<div class='option' onclick='selectAnswer(${i})'>${opt}</div>`;
});
document.getElementById("options").innerHTML=html;

updateProgress();
}

function selectAnswer(i){
if(answered) return;
answered=true;

let opts=document.querySelectorAll('.option');
opts.forEach((el,idx)=>{
if(idx==questions[index].correct) el.classList.add('correct');
if(idx==i && i!=questions[index].correct) el.classList.add('wrong');
});

if(i==questions[index].correct) score++;
}

function nextQuestion(){
index++;
if(index<questions.length){
loadQuestion();
}else{
endQuiz();
}
}

function startTimer(){
timer=setInterval(()=>{
time--;
document.getElementById("timer").innerText=time;

if(time<=10){
document.getElementById("timer").style.color="red";
}

if(time<=0) endQuiz();
},1000);
}

function updateProgress(){
document.getElementById("progress").style.width=(index/questions.length*100)+"%";
}

function endQuiz(){
clearInterval(timer);

document.getElementById("quiz").classList.add("hidden");
document.getElementById("result").classList.remove("hidden");

document.getElementById("score").innerText=
namaUser+", skor kamu: "+score+" / "+questions.length;

let msg = score>=16 ? "Luar biasa!" : score>=10 ? "Bagus!" : "Ayo belajar lagi!";
document.getElementById("message").innerText=msg;
}
</script>

</body>
</html>
